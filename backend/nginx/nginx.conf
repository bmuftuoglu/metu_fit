worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    # Rate limit zone'ları
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=auth_strict:10m rate=5r/m;

    upstream api_upstream {
        server api:8000;
    }

    upstream minio_upstream {
        server minio:9000;
    }

    server {
        listen 80;
        server_name _;

        # API — tüm /api/ istekleri FastAPI'ye
        location /api/ {
            proxy_pass http://api_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;
            proxy_read_timeout 60s;
        }

        # Login rate limit (kaba kuvvet koruması)
        location = /api/v1/auth/login {
            proxy_pass http://api_upstream/v1/auth/login;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            limit_req zone=auth_strict burst=3 nodelay;
            limit_req_status 429;
        }

        # MinIO presigned URL ile yüklenen dosyalar (GET only)
        location /files/ {
            proxy_pass http://minio_upstream/metufit-images/;
            proxy_buffering off;
            proxy_set_header Host minio:9000;
        }

        # Health check
        location /health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }
    }
}
