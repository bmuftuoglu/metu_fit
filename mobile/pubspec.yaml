name: metu_fit
description: "MetuFit — Kalori ve Spor Takip Uygulaması"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # HTTP Client
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # Local Storage
  flutter_secure_storage: ^9.2.2
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Maps & GPS
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2
  permission_handler: ^11.3.1

  # Images
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  flutter_image_compress: ^2.3.0
  image_cropper: ^8.0.2

  # Charts
  fl_chart: ^0.69.0

  # Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Utils
  intl: ^0.20.1
  uuid: ^4.5.1
  equatable: ^2.0.7
  logger: ^2.5.0
  connectivity_plus: ^6.1.1
  flutter_dotenv: ^5.2.1
  path_provider: ^2.1.5

  # UI
  shimmer: ^3.0.0
  infinite_scroll_pagination: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.9.2
  riverpod_generator: ^2.6.1
  custom_lint: ^0.7.4
  riverpod_lint: ^2.6.1
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - .env
